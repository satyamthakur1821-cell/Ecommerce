<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shopping cart - Review and manage your orders">
    <title>Shopping Cart | One8store</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

    <!-- HEADER & NAVIGATION -->
    <header>
        <nav>
            <div class="logo">
                One8store<span>.</span>
            </div>
            <div class="nav-right">
                <button class="cart-link"
                    style="border: none; background: transparent; color: var(--color-accent); cursor: default;"
                    disabled>
                    CART
                </button>
            </div>
        </nav>
    </header>

    <!-- MAIN CART CONTENT -->
    <main class="cart-container">

        <!-- CART HEADER -->
        <div class="cart-header">
            <h1>Shopping Cart</h1>
            <p>Review and manage your items before checkout</p>
        </div>

        <!-- EMPTY STATE -->
        <div id="empty-cart" class="cart-empty-state" style="display: none;">
            <h2>Your Cart is Empty</h2>
            <p style="margin-bottom: 2rem; color: #999;">Add some amazing products to get started</p>
            <a href="index.html" class="continue-shopping-btn">Continue Shopping</a>
        </div>

        <!-- CART ITEMS & SUMMARY WRAPPER -->
        <div id="cart-content" style="display: flex; gap: 2rem; flex-direction: row;">

            <!-- CART ITEMS -->
            <div class="cart-items-container" style="flex: 1;">
                <div id="cart-items"></div>
            </div>

            <!-- ORDER SUMMARY (Right Side) -->
            <div class="cart-summary" id="cart-summary" style="display: none;">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem; color: white;">Order Summary</h3>

                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>

                <div class="summary-row">
                    <span>Shipping:</span>
                    <span id="shipping">Free</span>
                </div>

                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>

                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>

                <button class="checkout-btn">
                    PROCEED TO CHECKOUT
                </button>

                <a href="index.html"
                    style="display: block; text-align: center; margin-top: 1rem; color: #0052FF; text-decoration: none; font-size: 0.875rem;">
                    ← Continue Shopping
                </a>
            </div>

        </div>

    </main>

    <!-- JAVASCRIPT -->
    <script src="./JS/cart.js"></script>
</body>

</html>
